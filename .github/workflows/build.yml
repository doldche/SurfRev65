name: Compilar SURF REV-65

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows VST3 + EXE
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: lukka/get-cmake@latest

      - name: Configurar CMake
        run: cmake -B ${{ github.workspace }}/build -S ${{ github.workspace }}

      - name: Compilar VST3
        run: cmake --build ${{ github.workspace }}/build --config Release --target SurfRev65_VST3 -j4

      - name: Compilar EXE
        run: cmake --build ${{ github.workspace }}/build --config Release --target SurfRev65_Standalone -j4

      - name: Recolectar archivos
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path ${{ github.workspace }}/out
          Get-ChildItem -Recurse -Filter "*.vst3" ${{ github.workspace }}/build | ForEach-Object {
            Copy-Item -Recurse $_.FullName ${{ github.workspace }}/out/
          }
          Get-ChildItem -Recurse -Filter "SURF REV-65.exe" ${{ github.workspace }}/build | ForEach-Object {
            Copy-Item $_.FullName "${{ github.workspace }}/out/SURF_REV65.exe"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: SURF-REV65-Windows
          path: ${{ github.workspace }}/out/
          retention-days: 30
